services:
  tutor:
    build: .
    env_file: .env
    volumes:
      - .:/app
      - /tmp/inktutor:/tmp/inktutor

  dashboard:
    build: .
    command: ["python", "-m", "uvicorn", "dashboard:app", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /tmp/inktutor:/tmp/inktutor
